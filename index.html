<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technovalle - KOI en Ovalle</title>
    <style>
        body {
            background-color: #0d0d0d; /* Fondo negro profundo */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Tipografía estilo técnico/industrial */
            overflow: hidden; /* Oculta barras de desplazamiento */
        }

        .container {
            text-align: center;
            position: relative;
        }

        img {
            max-width: 90vw; /* Imagen ancha pero no gigante */
            max-height: 80vh; /* Imagen alta pero con espacio */
            height: auto;
            border-radius: 4px;
            border: 1px solid rgba(255, 69, 0, 0.2); /* Borde naranja sutil */
            box-shadow: 0 0 50px rgba(255, 69, 0, 0.15); /* Resplandor naranja tenue */
            transition: all 0.5s ease; /* Transición suave */
        }

        img:hover {
            box-shadow: 0 0 70px rgba(255, 69, 0, 0.4); /* Resplandor más fuerte al pasar el mouse */
            transform: scale(1.02); /* Pequeño zoom */
        }

        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: transparent; /* Fondo transparente */
            color: #ff4500; /* Texto naranja */
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            border: 2px solid #ff4500; /* Borde naranja */
            border-radius: 2px;
            transition: all 0.3s;
        }

        .cta-button:hover {
            background-color: #ff4500; /* Fondo naranja al pasar el mouse */
            color: #0d0d0d; /* Texto oscuro al pasar el mouse */
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6); /* Resplandor en el botón */
        }

    </style>
</head>
<body>

    <div class="container">
        <img src="flayer2.0.png" alt="Afiche Technovalle Ovalle - KOI">
        <br>
        <a href="#" class="cta-button">ADQUIRIR ENTRADAS</a>
    </div>

</body>
</html>
